<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anubis & the Golem</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="scene">
      <img class="bg" src="assets/workshop.jpeg" alt="" />

      <!-- hotspots and item sprites are injected per-scene by script.js -->
      <div class="hotspots"></div>
      <div class="items"></div>

      <div id="message"></div>
      <div id="inventory"></div>

      <div id="assembled-golem" class="hidden">
        <img src="assets/golen%201.png" alt="" />
      </div>

      <div id="dialogue" class="hidden">
        <div class="dialogue-box">
          <div id="dialogue-portrait" class="portrait"></div>
          <div id="dialogue-speaker"></div>
          <p id="dialogue-text"></p>
          <div id="dialogue-choices"></div>
          <button id="dialogue-next">Continue</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
