<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anubis & the Golem</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="scene">
      <img class="bg" src="assets/workshop.jpeg" alt="" />

      <button
        id="music-toggle"
        type="button"
        aria-label="Toggle music"
        title="Mute music"
      >
        ♪
      </button>

      <!-- hotspots and item sprites are injected per-scene by script.js -->
      <div class="hotspots"></div>
      <div class="items"></div>

      <div id="message"></div>
      <div id="inventory"></div>

      <div id="assembled-golem" class="hidden">
        <img src="assets/golen%201.png" alt="" />
      </div>

      <div class="fire-shimmers"></div>

      <svg id="god-rays" class="hidden" preserveAspectRatio="none">
        <defs id="god-rays-defs">
          <linearGradient id="god-rays-fade" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="100">
            <stop offset="0%" stop-color="white" />
            <stop offset="100%" stop-color="black" />
          </linearGradient>
          <mask id="god-rays-mask" maskUnits="userSpaceOnUse">
            <rect id="god-rays-mask-bg" x="0" y="0" fill="url(#god-rays-fade)" />
            <polygon id="god-rays-shadow" points="" fill="black" />
            <circle id="god-rays-cursor" cx="-9999" cy="-9999" r="0" fill="black" />
          </mask>
          <filter id="god-rays-side-blur" x="-5%" y="-5%" width="110%" height="110%">
            <feGaussianBlur id="god-rays-blur-amount" stdDeviation="0 0" />
          </filter>
        </defs>
        <g id="god-rays-group" mask="url(#god-rays-mask)" filter="url(#god-rays-side-blur)"></g>
      </svg>

      <div id="dialogue" class="hidden">
        <div class="dialogue-box">
          <div id="dialogue-portrait" class="portrait"></div>
          <div id="dialogue-speaker"></div>
          <p id="dialogue-text"></p>
          <div id="dialogue-choices"></div>
          <button id="dialogue-next">Continue</button>
        </div>
      </div>
    </div>
    <!-- Shared SVG filter used as backdrop-filter on .fire-shimmer divs.
         Sits outside .scene so it doesn't participate in zoom transforms. -->
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <defs>
        <filter id="heat-haze" x="-10%" y="-10%" width="120%" height="120%">
          <feTurbulence
            id="heat-turbulence"
            type="fractalNoise"
            baseFrequency="0.018 0.045"
            numOctaves="2"
            seed="3"
            result="noise"
          />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" />
        </filter>
      </defs>
    </svg>

    <script src="script.js"></script>
  </body>
</html>
